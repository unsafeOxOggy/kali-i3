# ─── Shadows ──────────────────────────────────────────────────────────────────
# Disabled by default for better performance in virtual environments
shadow = false;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.7;

shadow-exclude = [
  "window_type = 'dnd'",
  "window_type = 'dock'",
  "_GTK_FRAME_EXTENTS@:c"
];

# ─── Fading (Animations) ──────────────────────────────────────────────────────
fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.04;

# ─── Global Settings ──────────────────────────────────────────────────────────
# VM OPTIMIZATION: 'xrender' uses the CPU instead of the GPU.
# This prevents crashes, lag, and flashing bars inside virtual machines.
backend = "xrender";

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;

# VM OPTIMIZATION: Vsync often causes severe rendering lag inside VMs.
vsync = false;

detect-transient = true;
use-damage = false;

focus-exclude = [ "class_g = 'Cairo-clock'" ];

# ─── Window Types ─────────────────────────────────────────────────────────────
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; };
  dock    = { shadow = false; };
  dnd     = { shadow = false; };
};

# ─── Per-Application Transparency (Opacity Rules) ─────────────────────────────
# Adjust these values to control the active/inactive opacity of specific apps.
opacity-rule = [
  "85:class_g = 'Alacritty'",
  "90:class_g = 'Code'",
  "90:class_g = 'Sublime_text'"
];
