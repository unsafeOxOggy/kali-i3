# i3blocks configuration file
# Global parameters and markup
separator=false
separator_block_width=20
markup=pango

# ─── Package Updates (Apt) ────────────────────────────────
[updates]
label=<span color="#ffcc66"> </span>
command=apt list --upgradable 2>/dev/null | grep -c upgradable || echo "0"
interval=1800
color=#ffffff

# ─── Network Interface (VPN / TUN0) ───────────────────────
[iface]
label=<span color="#00F3FF">󰦝 </span>
command=ip -4 addr show tun0 2>/dev/null | grep -oP '(?<=inet\s)\d+(\.\d+){3}' || echo "Disconnected"
color=#ffffff
interval=10

# ─── Coupled CPU & RAM ────────────────────────────────────
[CPU]
label=<span color="#FF0055">󰍛 </span>
command=grep 'cpu ' /proc/stat | awk '{usage=($2+$4)*100/($2+$4+$5)} END {printf "%.0f%%\n", usage}'
interval=2
color=#ffffff

[memory]
label=<span color="#FF0055">   </span>
command=free -h | awk '/^Mem:/ {print $3}'
interval=2
color=#ffffff

# ─── Disk Space ───────────────────────────────────────────
[disk]
label=<span color="#C0CAF5">󰋊 </span>
command=df -h / | awk 'NR==2 {print $5}'
color=#ffffff
interval=3600

# ─── Clean Date & Time (Day + HH:MM) ──────────────────────
[time]
label=
command=echo "<span color='#9FE697'>$(date '+%A %H:%M') </span>"
interval=5

# ─── End Spacer / Separator ───────────────────────────────
[sep1]
command=echo "<span color='#333333'></span>"
interval=once
